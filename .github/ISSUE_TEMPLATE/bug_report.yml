name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact `bb` command(s) that trigger the bug.
      placeholder: |
        bb pr list --project MYPROJ
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: debug
    attributes:
      label: Debug output
      description: Run the command with `--debug` and paste the output here.
      render: shell

  - type: input
    id: version
    attributes:
      label: bb version
      description: Run `bb --version`
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: macOS 14 arm64
    validations:
      required: true
