version: 2

project_name: bb

before:
  hooks: []

builds:
  - id: bb
    main: ./cmd/bb
    binary: bb
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - repository:
      owner: ManpreetShuann
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/ManpreetShuann/bitbucket-cli"
    description: "A command-line interface for Bitbucket"
    license: "MIT"
    install: |
      bin.install "bb"
    test: |
      system "#{bin}/bb", "version"

release:
  github:
    owner: ManpreetShuann
    name: bitbucket-cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
