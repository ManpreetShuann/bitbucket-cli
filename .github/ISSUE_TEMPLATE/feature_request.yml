name: Feature Request
description: Suggest a new command, flag, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Got an idea? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is currently difficult or impossible?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the command, flag, or behaviour you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other tools you've looked at.

  - type: textarea
    id: context
    attributes:
      label: Additional context
